name: jems
description: "Jems - Your AI Life Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  web_socket_channel: ^3.0.2
  http: ^1.3.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  intl: ^0.20.2
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2
  url_launcher: ^6.2.0
  image_picker: ^1.1.2
  speech_to_text: ^7.0.0
  record: ^6.0.0
  just_audio: ^0.9.46
  flutter_contacts: ^1.1.9+2
  share_plus: ^10.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "jems_icon.png"
  adaptive_icon_background: "#FCFCFC"
  adaptive_icon_foreground: "jems_icon.png"

flutter:
  uses-material-design: true
